name: Global Forms Pilot (Provider x Form Suite)

on:
  workflow_dispatch:
    inputs:
      provider_scope:
        description: "Набор провайдеров"
        required: true
        default: "big_two"
        type: choice
        options:
          - big_two
          - small
          - all
          - beeline_split
          - mts
          - beeline
          - megafon
          - t2
          - rostelecom
          - domru
          - ttk
      form_suite:
        description: "Тип формы (или all)"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - profit
          - connection
          - connection_cards
          - checkaddress
          - business
          - undecided
          - moving
          - express
      service_mode:
        description: "Режим submit"
        required: true
        default: "core"
        type: choice
        options:
          - core
          - variants
          - all
      max_parallel:
        description: "Максимум параллельных matrix-джоб"
        required: true
        default: "2"
        type: choice
        options:
          - "1"
          - "2"
          - "3"
          - "4"
      run_chromium:
        description: "Запустить Chromium"
        required: true
        default: true
        type: boolean
      run_firefox:
        description: "Запустить Firefox"
        required: true
        default: false
        type: boolean
      run_webkit:
        description: "Запустить WebKit"
        required: true
        default: false
        type: boolean

jobs:
  build_matrix:
    name: Build Matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.build.outputs.matrix }}
    steps:
      - name: Build provider x form suite matrix
        id: build
        shell: bash
        env:
          PROVIDER_SCOPE: ${{ inputs.provider_scope }}
          FORM_SUITE: ${{ inputs.form_suite }}
        run: |
          python - <<'PY'
          import json
          import os

          all_providers = ["mts", "beeline", "megafon", "t2", "rostelecom", "domru", "ttk"]
          suites_all = [
              "profit",
              "connection",
              "connection_cards",
              "checkaddress",
              "business",
              "undecided",
              "moving",
              "express",
          ]

          provider_scope = (os.getenv("PROVIDER_SCOPE") or "big_two").strip()
          form_suite = (os.getenv("FORM_SUITE") or "all").strip()

          providers_by_scope = {
              "big_two": ["mts", "beeline"],
              "small": ["megafon", "t2", "rostelecom", "domru", "ttk"],
              "all": all_providers,
          }
          suites = suites_all if form_suite == "all" else [form_suite]

          matrix = []
          if provider_scope == "beeline_split":
              for suite in suites:
                  matrix.append(
                      {
                          "brand": "beeline",
                          "brand_label": "beeline-1of2",
                          "form_suite": suite,
                          "url_shard_index": 1,
                          "url_shard_total": 2,
                      }
                  )
                  matrix.append(
                      {
                          "brand": "beeline",
                          "brand_label": "beeline-2of2",
                          "form_suite": suite,
                          "url_shard_index": 2,
                          "url_shard_total": 2,
                      }
                  )
          else:
              providers = providers_by_scope.get(provider_scope, [provider_scope])
              matrix = [
                  {
                      "brand": provider,
                      "brand_label": provider,
                      "form_suite": suite,
                      "url_shard_index": 1,
                      "url_shard_total": 1,
                  }
                  for suite in suites
                  for provider in providers
              ]
          print("Matrix size:", len(matrix))
          print(json.dumps(matrix, ensure_ascii=False))

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
              fh.write(f"matrix={json.dumps(matrix)}\n")
          PY

  pilot:
    name: Pilot • ${{ matrix.brand_label }} • ${{ matrix.form_suite }}
    needs: build_matrix
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: ${{ fromJson(inputs.max_parallel) }}
      matrix:
        include: ${{ fromJson(needs.build_matrix.outputs.matrix) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browsers
        run: |
          sudo apt-get update
          python -m playwright install --with-deps chromium firefox webkit

      - name: Run in Chromium
        if: ${{ inputs.run_chromium }}
        run: |
          python -m pytest big_landing_code.py \
            -rs \
            --url-brand=${{ matrix.brand }} \
            --form-suite=${{ matrix.form_suite }} \
            --url-shard-index=${{ matrix.url_shard_index }} \
            --url-shard-total=${{ matrix.url_shard_total }} \
            --service-mode=${{ inputs.service_mode }} \
            --browser=chromium \
            --execution-profile=desktop \
            --blocking-profile=none \
            --alluredir=allure-results

      - name: Run in Firefox
        if: ${{ inputs.run_firefox }}
        run: |
          python -m pytest big_landing_code.py \
            -rs \
            --url-brand=${{ matrix.brand }} \
            --form-suite=${{ matrix.form_suite }} \
            --url-shard-index=${{ matrix.url_shard_index }} \
            --url-shard-total=${{ matrix.url_shard_total }} \
            --service-mode=${{ inputs.service_mode }} \
            --browser=firefox \
            --execution-profile=desktop \
            --blocking-profile=none \
            --alluredir=allure-results

      - name: Run in WebKit
        if: ${{ inputs.run_webkit }}
        run: |
          python -m pytest big_landing_code.py \
            -rs \
            --url-brand=${{ matrix.brand }} \
            --form-suite=${{ matrix.form_suite }} \
            --url-shard-index=${{ matrix.url_shard_index }} \
            --url-shard-total=${{ matrix.url_shard_total }} \
            --service-mode=${{ inputs.service_mode }} \
            --browser=webkit \
            --execution-profile=desktop \
            --blocking-profile=none \
            --alluredir=allure-results

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-${{ matrix.brand_label }}-${{ matrix.form_suite }}
          path: allure-results
          if-no-files-found: ignore
